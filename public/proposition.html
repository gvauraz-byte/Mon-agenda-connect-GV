<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Proposition de rendez-vous</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #F7F6F3;
    color: #2C2C2A;
    padding: 20px;
  }
  .card {
    max-width: 460px;
    margin: 40px auto 0;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #D3D1C7;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  p.intro { font-size: 13px; color: #888780; margin: 0 0 20px; }
  .detail-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #F1EFE8; font-size: 14px; }
  .detail-row .label { color: #888780; min-width: 70px; font-size: 12px; padding-top: 2px; }
  .proj-badge { display: inline-flex; align-items: center; gap: 6px; }
  .proj-badge .dot { width: 10px; height: 10px; border-radius: 50%; }
  .actions { display: flex; gap: 10px; margin-top: 22px; }
  .actions button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
  .accept { background: #2C2C2A; color: #fff; }
  .decline { background: #F1EFE8; color: #A32D2D; }
  .own-actions { display: flex; gap: 10px; margin-top: 12px; }
  .own-actions a { flex: 1; text-align: center; padding: 10px; border-radius: 8px; border: 1px solid #D3D1C7; font-size: 13px; cursor: pointer; text-decoration: none; color: #185FA5; background: #fff; }
  .own-hint { font-size: 11px; color: #888780; margin: 10px 0 0; text-align: center; }
  #state { display: none; text-align: center; padding: 20px 0; }
  #state h2 { font-size: 16px; margin: 0 0 6px; }
  #state p { font-size: 13px; color: #888780; }
  #error { display: none; color: #A32D2D; font-size: 13px; text-align: center; padding: 30px 0; }
</style>
</head>
<body>

<div class="card" id="card">
  <div id="content">
    <h1>Chargement...</h1>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
function fmtTime(isoStr){
  return new Date(isoStr).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function addDaysStr(dateStr, n){
  const d = new Date(dateStr+'T00:00:00Z');
  d.setUTCDate(d.getUTCDate()+n);
  return d.toISOString().slice(0,10);
}
function icsDateOnly(dateStr){ return dateStr.replace(/-/g,''); }
function icsDateTime(isoStr){
  const d = new Date(isoStr);
  return d.getUTCFullYear()+String(d.getUTCMonth()+1).padStart(2,'0')+String(d.getUTCDate()).padStart(2,'0')
    +'T'+String(d.getUTCHours()).padStart(2,'0')+String(d.getUTCMinutes()).padStart(2,'0')+String(d.getUTCSeconds()).padStart(2,'0')+'Z';
}
function escapeIcs(str){
  return String(str||'').replace(/[\\,;]/g, m=>'\\'+m).replace(/\n/g,'\\n');
}
function buildIcs(prop){
  const uid = 'proposition-'+(prop.id||Date.now())+'@agenda-projets';
  let dtstart, dtend;
  if(prop.allDay){
    dtstart = 'DTSTART;VALUE=DATE:'+icsDateOnly(prop.start.slice(0,10));
    const endExclusive = addDaysStr((prop.end||prop.start).slice(0,10), 1);
    dtend = 'DTEND;VALUE=DATE:'+icsDateOnly(endExclusive);
  } else {
    dtstart = 'DTSTART:'+icsDateTime(prop.start);
    dtend = 'DTEND:'+icsDateTime(prop.end||prop.start);
  }
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Agenda Projets//Proposition//FR','BEGIN:VEVENT',
    'UID:'+uid, 'DTSTAMP:'+icsDateTime(new Date().toISOString()), dtstart, dtend,
    'SUMMARY:'+escapeIcs(prop.title),
    prop.location ? 'LOCATION:'+escapeIcs(prop.location) : '',
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean);
  return lines.join('\r\n');
}
function downloadIcs(prop){
  const blob = new Blob([buildIcs(prop)], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rendez-vous.ics';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function googleCalUrl(prop){
  let dates;
  if(prop.allDay){
    const endExclusive = addDaysStr((prop.end||prop.start).slice(0,10), 1);
    dates = icsDateOnly(prop.start.slice(0,10))+'/'+icsDateOnly(endExclusive);
  } else {
    dates = icsDateTime(prop.start)+'/'+icsDateTime(prop.end||prop.start);
  }
  const p = new URLSearchParams({ action:'TEMPLATE', text: prop.title, dates, location: prop.location||'' });
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}
function ownActionsHtml(){
  return `
    <div class="own-actions">
      <a href="#" id="ics-link">Ajouter a mon agenda (.ics)</a>
      <a href="#" id="google-link" target="_blank" rel="noopener">Google Calendar</a>
    </div>
    <p class="own-hint">Ceci ajoute le rendez-vous a TON propre agenda (Apple/Outlook/Google), en plus de ta reponse ci-dessus.</p>
  `;
}
function wireOwnActions(prop){
  const icsLink = document.getElementById('ics-link');
  const googleLink = document.getElementById('google-link');
  if(icsLink) icsLink.addEventListener('click', (e)=>{ e.preventDefault(); downloadIcs(prop); });
  if(googleLink) googleLink.href = googleCalUrl(prop);
}

async function init(){
  const content = document.getElementById('content');
  if(!id){
    content.innerHTML = '<h1>Lien invalide</h1><p class="intro">Ce lien de proposition est incomplet.</p>';
    return;
  }
  let prop;
  try{
    const res = await fetch('/api/proposals/'+id);
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      content.innerHTML = `<h1>Indisponible</h1><p class="intro">${err.error || "Cette proposition n'existe plus."}</p>`;
      return;
    }
    prop = await res.json();
  } catch(e){
    content.innerHTML = '<h1>Erreur</h1><p class="intro">Impossible de charger la proposition.</p>';
    return;
  }

  if(prop.status !== 'pending'){
    const label = prop.status === 'accepted' ? 'Ce rendez-vous a deja ete accepte et confirme.' : 'Cette proposition a deja ete refusee.';
    content.innerHTML = `<h1>${prop.title}</h1><p class="intro">${label}</p>`;
    return;
  }

  let dateLine = fmtDate(prop.start.slice(0,10));
  const endDay = (prop.end || prop.start).slice(0,10);
  if(!prop.allDay){
    dateLine = fmtDate(prop.start.slice(0,10)) + ' de ' + fmtTime(prop.start) + ' a ' + fmtTime(prop.end || prop.start);
  } else if(endDay !== prop.start.slice(0,10)){
    dateLine += ' au ' + fmtDate(endDay);
  } else {
    dateLine += ' (journee entiere)';
  }

  content.innerHTML = `
    <h1>Proposition de rendez-vous</h1>
    <p class="intro">Voici les details proposes. Tu peux accepter (le rendez-vous sera confirme automatiquement) ou refuser.</p>
    <div class="detail-row"><span class="label">Titre</span><span>${prop.title}</span></div>
    <div class="detail-row"><span class="label">Quand</span><span>${dateLine}</span></div>
    ${prop.location ? `<div class="detail-row"><span class="label">Lieu</span><span>${prop.location}</span></div>` : ''}
    ${prop.projectName ? `<div class="detail-row"><span class="label">Projet</span><span class="proj-badge"><span class="dot" style="background:${prop.projectColor||'#B4B2A9'}"></span>${prop.projectName}</span></div>` : ''}
    <div class="actions">
      <button class="accept" id="btn-accept">Accepter</button>
      <button class="decline" id="btn-decline">Refuser</button>
    </div>
    ${ownActionsHtml()}
  `;
  wireOwnActions(prop);

  document.getElementById('btn-accept').addEventListener('click', async ()=>{
    await respond('accept', 'Rendez-vous confirme !', "Merci, l'evenement a ete ajoute a l'agenda.");
  });
  document.getElementById('btn-decline').addEventListener('click', async ()=>{
    await respond('decline', 'Proposition refusee', 'Merci de ta reponse, rien ne sera ajoute.');
  });

  async function respond(action, title, msg){
    const buttons = document.querySelectorAll('.actions button');
    buttons.forEach(b=> b.disabled = true);
    try{
      const res = await fetch(`/api/proposals/${id}/${action}`, { method: 'POST' });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        content.innerHTML = `<h1>Oups</h1><p class="intro">${err.error || 'Une erreur est survenue.'}</p>`;
        return;
      }
      content.innerHTML = `<h2>${title}</h2><p class="intro">${msg}</p>${action==='accept' ? ownActionsHtml() : ''}`;
      if(action==='accept') wireOwnActions(prop);
    } catch(e){
      content.innerHTML = '<h1>Erreur</h1><p class="intro">Impossible d\'envoyer ta reponse, reessaie.</p>';
    }
  }
}

init();
</script>
</body>
</html>
